<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3eaf7c"/>
      <stop offset="1" stop-color="#2c8a5f"/>
    </linearGradient>
  </defs>
  <!-- 芯片基底 -->
  <rect x="14" y="14" width="36" height="36" rx="4" fill="url(#g)"/>
  <!-- 内框 -->
  <rect x="22" y="22" width="20" height="20" rx="2" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
  <!-- 中央芯片 -->
  <rect x="26" y="26" width="12" height="12" rx="1" fill="#fff" opacity="0.95"/>
  <!-- 上引脚 -->
  <rect x="20" y="6" width="3" height="8" fill="#3eaf7c"/>
  <rect x="30" y="6" width="3" height="8" fill="#3eaf7c"/>
  <rect x="40" y="6" width="3" height="8" fill="#3eaf7c"/>
  <!-- 下引脚 -->
  <rect x="20" y="50" width="3" height="8" fill="#3eaf7c"/>
  <rect x="30" y="50" width="3" height="8" fill="#3eaf7c"/>
  <rect x="40" y="50" width="3" height="8" fill="#3eaf7c"/>
  <!-- 左引脚 -->
  <rect x="6" y="20" width="8" height="3" fill="#3eaf7c"/>
  <rect x="6" y="30" width="8" height="3" fill="#3eaf7c"/>
  <rect x="6" y="40" width="8" height="3" fill="#3eaf7c"/>
  <!-- 右引脚 -->
  <rect x="50" y="20" width="8" height="3" fill="#3eaf7c"/>
  <rect x="50" y="30" width="8" height="3" fill="#3eaf7c"/>
  <rect x="50" y="40" width="8" height="3" fill="#3eaf7c"/>
  <!-- 中心电路符号 -->
  <circle cx="32" cy="32" r="2.5" fill="#3eaf7c"/>
  <text x="32" y="38" font-size="6" font-family="monospace" font-weight="bold" fill="#3eaf7c" text-anchor="middle">HW</text>
</svg>