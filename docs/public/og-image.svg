<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3eaf7c"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#3eaf7c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3eaf7c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3eaf7c" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 背景层 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 装饰电路板走线（左下） -->
  <g opacity="0.35" stroke="#3eaf7c" stroke-width="2" fill="none">
    <path d="M 0 580 L 80 580 L 80 540 L 160 540 L 160 500 L 240 500"/>
    <circle cx="80" cy="580" r="4" fill="#3eaf7c"/>
    <circle cx="240" cy="500" r="4" fill="#22d3ee"/>
  </g>
  <g opacity="0.25" stroke="#22d3ee" stroke-width="2" fill="none">
    <path d="M 0 520 L 60 520 L 60 470 L 140 470"/>
    <circle cx="60" cy="520" r="3" fill="#22d3ee"/>
    <circle cx="140" cy="470" r="3" fill="#3eaf7c"/>
  </g>

  <!-- 装饰芯片轮廓（右上） -->
  <g opacity="0.18" transform="translate(980 60)">
    <rect x="0" y="0" width="180" height="180" rx="14" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <rect x="20" y="20" width="140" height="140" rx="8" fill="#22d3ee" fill-opacity="0.15"/>
    <!-- 引脚 -->
    <g stroke="#22d3ee" stroke-width="2">
      <line x1="-15" y1="40" x2="0" y2="40"/>
      <line x1="-15" y1="80" x2="0" y2="80"/>
      <line x1="-15" y1="120" x2="0" y2="120"/>
      <line x1="180" y1="40" x2="195" y2="40"/>
      <line x1="180" y1="80" x2="195" y2="80"/>
      <line x1="180" y1="120" x2="195" y2="120"/>
      <line x1="40" y1="-15" x2="40" y2="0"/>
      <line x1="90" y1="-15" x2="90" y2="0"/>
      <line x1="140" y1="-15" x2="140" y2="0"/>
      <line x1="40" y1="180" x2="40" y2="195"/>
      <line x1="90" y1="180" x2="90" y2="195"/>
      <line x1="140" y1="180" x2="140" y2="195"/>
    </g>
    <text x="90" y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="20" fill="#22d3ee">MCU</text>
  </g>

  <!-- 标题块 -->
  <g transform="translate(80 200)">
    <!-- 角标徽章 -->
    <g>
      <rect x="0" y="0" width="220" height="44" rx="22" fill="#3eaf7c" fill-opacity="0.15" stroke="#3eaf7c" stroke-width="1.5"/>
      <text x="110" y="29" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#3eaf7c">嵌入式硬件速查手册</text>
    </g>

    <!-- 主标题 -->
    <text x="0" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" fill="#f8fafc" letter-spacing="-2">DriverKit</text>

    <!-- 中文标题 -->
    <text x="0" y="200" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="64" font-weight="700" fill="#22d3ee">驱动派</text>

    <!-- 副标题 -->
    <text x="0" y="260" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="400" fill="#cbd5e1">53 个常用模块 · 原理 · 选型 · 接线 · 驱动 · 调试</text>

    <!-- 装饰线 -->
    <rect x="0" y="290" width="120" height="4" rx="2" fill="url(#accent)"/>

    <!-- 标签 -->
    <g transform="translate(0 320)" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" fill="#94a3b8">
      <text x="0" y="20">🧭 传感器</text>
      <text x="160" y="20">⚙️ 执行器</text>
      <text x="320" y="20">📡 通信</text>
      <text x="460" y="20">🖥️ 显示</text>
      <text x="600" y="20">💾 存储</text>
      <text x="740" y="20">⚡ 电源</text>
      <text x="880" y="20">🕐 时钟</text>
    </g>
  </g>

  <!-- 底部 URL -->
  <g transform="translate(80 560)">
    <text font-family="ui-monospace, 'SF Mono', monospace" font-size="22" fill="#64748b">younglet.github.io/driver-kit</text>
  </g>

  <!-- 右侧大号标识 -->
  <g transform="translate(960 360)" opacity="0.9">
    <!-- 芯片 PCB 图形 -->
    <g stroke="#3eaf7c" stroke-width="3" fill="none">
      <rect x="0" y="0" width="140" height="140" rx="10"/>
      <rect x="20" y="20" width="100" height="100" rx="6" fill="#3eaf7c" fill-opacity="0.1"/>
    </g>
    <text x="70" y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="32" font-weight="700" fill="#3eaf7c">53</text>
    <text x="70" y="108" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">MODULES</text>
  </g>
</svg>